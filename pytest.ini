[pytest]
# Configuration pytest
testpaths = llm_agent/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclure les dossiers qui ne sont pas des tests
norecursedirs = .git .venv venv build dist *.egg llm_agent/examples llm_agent/scripts llm_agent/docs

# Markers
markers =
    slow: marque un test comme lent (déselectionne avec -m "not slow")
    integration: test d'intégration
    api: test necessite l'API OpenAI

# Options additionnelles
addopts = 
    -ra
    --strict-markers
    --disable-warnings
